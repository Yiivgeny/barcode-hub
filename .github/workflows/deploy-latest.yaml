name: Deploy latest package

on:
  workflow_run:
    workflows: ["Docker image"]
    types: [completed]
    branches: ["main"]

permissions:
  contents: read
  packages: read

env:
  IMAGE_REPOSITORY: ghcr.io/yiivgeny/barcode-hub

jobs:
  notify:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for latest image revision
        env:
          EXPECTED_REVISION: ${{ github.event.workflow_run.head_sha }}
        run: |
          expected_image="${IMAGE_REPOSITORY}:sha-${EXPECTED_REVISION:0:7}"
          latest_image="${IMAGE_REPOSITORY}:latest"

          for attempt in {1..24}; do
            expected_digest="$(docker buildx imagetools inspect "$expected_image" --format '{{.Manifest.Digest}}' 2>/dev/null || true)"
            latest_digest="$(docker buildx imagetools inspect "$latest_image" --format '{{.Manifest.Digest}}' 2>/dev/null || true)"

            if [ -n "$expected_digest" ] && [ "$expected_digest" = "$latest_digest" ]; then
              echo "$latest_image points to $expected_image digest $latest_digest"
              exit 0
            fi

            if [ -z "$expected_digest" ]; then
              echo "$expected_image is not pullable yet, retry ${attempt}/24"
            elif [ -z "$latest_digest" ]; then
              echo "$latest_image is not pullable yet, retry ${attempt}/24"
            else
              echo "$latest_image digest $latest_digest does not match $expected_image digest $expected_digest, retry ${attempt}/24"
            fi
            sleep 5
          done

          echo "$latest_image did not point to $expected_image" >&2
          docker buildx imagetools inspect "$expected_image" || true
          docker buildx imagetools inspect "$latest_image" || true
          exit 1

      - name: Deploy to Coolify
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL secret is not configured" >&2
            exit 1
          fi
          if [ -z "$DEPLOY_WEBHOOK_SECRET" ]; then
            echo "DEPLOY_WEBHOOK_SECRET secret is not configured" >&2
            exit 1
          fi

          curl --fail-with-body --show-error --silent --location \
            --request GET "$DEPLOY_WEBHOOK_URL" \
            --header "Authorization: Bearer $DEPLOY_WEBHOOK_SECRET"
